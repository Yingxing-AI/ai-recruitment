services:
  postgres:
    image: ${DOCKER_IMAGE_PROXY:-docker.1ms.run}/postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_recruitment}
      POSTGRES_USER: ${POSTGRES_USER:-ai_recruitment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_recruitment}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_recruitment}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${DOCKER_IMAGE_PROXY:-docker.1ms.run}/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: ${DOCKER_IMAGE_PROXY:-docker.1ms.run}/minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.1ms.run/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    environment:
      APP_NAME: ${APP_NAME:-AI Recruitment System}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_recruitment:ai_recruitment@postgres:5432/ai_recruitment}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: /app/uploads
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-resumes}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mock-recruitment}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

  worker:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.1ms.run/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    environment:
      APP_NAME: ${APP_NAME:-AI Recruitment System}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_recruitment:ai_recruitment@postgres:5432/ai_recruitment}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: /app/uploads
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-resumes}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mock-recruitment}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    command: ["python", "-m", "app.tasks.worker"]
    depends_on:
      - backend
      - redis
      - minio
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.1ms.run/node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.1ms.run/nginx:1.27-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_uploads:
